<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoices</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/invoices.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Invoices</h1>
      <p>Create, manage, and send invoices.</p>
    </div>
    <div class="topbar-actions">
      <button id="newInvoiceBtn" class="btn btn-primary">New Invoice</button>
      <button id="logoutBtn" class="btn btn-secondary">Logout</button>
    </div>
  </header>

  <main class="page-wrap">
    <section class="card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Invoice No</th>
              <th>Client</th>
              <th>Status</th>
              <th>Total</th>
              <th>Issue Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="invoiceTableBody">
            <tr><td colspan="6">Loading invoices...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="invoiceDialog" class="admin-dialog admin-dialog-wide">
    <div class="dialog-head">
      <h2 id="dialogTitle">New Invoice</h2>
      <button type="button" class="icon-btn" id="closeDialogBtn">✕</button>
    </div>

    <form id="invoiceForm" class="dialog-body admin-form">
      <input type="hidden" id="invoiceId" />

      <div class="grid-2">
        <div class="form-row">
          <label for="invoiceNumber">Invoice Number</label>
          <input id="invoiceNumber" type="text" required />
        </div>
        <div class="form-row">
          <label for="status">Status</label>
          <select id="status">
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="paid">Paid</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>

      <div class="grid-2">
        <div class="form-row">
          <label for="clientName">Client Name</label>
          <input id="clientName" type="text" required />
        </div>
        <div class="form-row">
          <label for="clientEmail">Client Email</label>
          <input id="clientEmail" type="email" required />
        </div>
      </div>

      <div class="grid-2">
        <div class="form-row">
          <label for="clientPhone">Client Phone</label>
          <input id="clientPhone" type="text" />
        </div>
        <div class="form-row">
          <label for="clientCompany">Client Company</label>
          <input id="clientCompany" type="text" />
        </div>
      </div>

      <div class="form-row">
        <label for="clientAddress">Client Address</label>
        <textarea id="clientAddress" rows="3"></textarea>
      </div>

      <div class="grid-3">
        <div class="form-row">
          <label for="issueDate">Issue Date</label>
          <input id="issueDate" type="date" required />
        </div>
        <div class="form-row">
          <label for="dueDate">Due Date</label>
          <input id="dueDate" type="date" />
        </div>
        <div class="form-row">
          <label for="currency">Currency</label>
          <input id="currency" type="text" value="USD" />
        </div>
      </div>

      <div class="grid-2">
        <div class="form-row">
          <label for="itinerarySelect">Linked Itinerary</label>
          <select id="itinerarySelect">
            <option value="">No linked itinerary</option>
          </select>
        </div>
        <div class="form-row">
          <label>&nbsp;</label>
          <button type="button" id="loadItineraryBtn" class="btn btn-secondary">
            Add itinerary as line item
          </button>
        </div>
      </div>

      <div class="line-items-head">
        <h3>Line Items</h3>
        <button type="button" id="addLineItemBtn" class="btn btn-secondary">Add Item</button>
      </div>

      <div id="lineItemsContainer" class="line-items-container"></div>

      <div class="grid-3">
        <div class="form-row">
          <label for="subtotal">Subtotal</label>
          <input id="subtotal" type="number" step="0.01" value="0" />
        </div>
        <div class="form-row">
          <label for="tax">Tax</label>
          <input id="tax" type="number" step="0.01" value="0" />
        </div>
        <div class="form-row">
          <label for="discount">Discount</label>
          <input id="discount" type="number" step="0.01" value="0" />
        </div>
      </div>

      <div class="form-row">
        <label for="total">Total</label>
        <input id="total" type="number" step="0.01" value="0" />
      </div>

      <div class="form-row">
        <label for="paymentTerms">Payment Terms</label>
        <textarea id="paymentTerms" rows="3"></textarea>
      </div>

      <div class="form-row">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="4"></textarea>
      </div>

      <div class="dialog-actions">
        <button type="submit" class="btn btn-primary">Save Invoice</button>
        <button type="button" id="sendInvoiceBtn" class="btn btn-secondary">Save & Send</button>
      </div>

      <p id="formMessage" class="form-message"></p>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/invoices.js"></script>
</body>
</html>
